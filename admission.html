<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admission | ST. XAVIERS SCHOOL</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .form-box { max-width: 600px; margin: 0 auto; background: white; padding: 40px; border-radius: 15px; }
        input, select, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; }
        .btn { background: var(--primary); color: white; border: none; padding: 15px; width: 100%; cursor: pointer; border-radius: 5px; font-size: 1.1rem; }
    </style>
</head>
<body>
    <div id="header-placeholder"></div>

    <section>
        <h2 class="section-title">Admission Enquiry 2026-27</h2>
        <div class="form-box">
            <form action="#">
                <input type="text" placeholder="Student Name" required>
                <input type="text" placeholder="Parent Name" required>
                <select>
                    <option>Select Grade</option>
                    <option>Nursery - UKG</option>
                    <option>Class I - V</option>
                    <option>Class VI - X</option>
                </select>
                <input type="tel" placeholder="Mobile Number" required>
                <textarea placeholder="Your Message"></textarea>
                <button type="submit" class="btn">Submit Enquiry</button>
            </form>
        </div>
    </section>

    <div id="footer-placeholder"></div>
    <script src="script.js"></script>
</body>
</html>
